name: Build Kernel with KernelSU

on:
  workflow_dispatch:
    inputs:
      kernel_url:
        description: 'رابط سورس النواة (ZIP, tar.gz, .git, Google Drive)'
        required: true
      boot_url:
        description: 'رابط boot.img الأصلي (اختياري - يفضل تركه فارغاً واستخدام AnyKernel3)'
        required: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run build script
        run: |
          chmod +x build_kernel.sh
          INPUT_KERNEL_URL="${{ github.event.inputs.kernel_url }}" \
          INPUT_BOOT_URL="${{ github.event.inputs.boot_url }}" \
          ./build_kernel.sh
        env:
          AK3_CHOICE_ENV: "y"   # يطلب إنشاء AnyKernel3.zip

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: kernel-output
          path: kernel-source/build/
