name: Build Kernel (Exynos) - Auto Source + boot.img

on:
  workflow_dispatch:
    inputs:
      kernel_source_url:
        description: 'رابط سورس النواة (ZIP, TAR.GZ, TAR.XZ, أو repo .git) - اتركه فارغاً لاستخدام السورس الموجود في مجلد kernel/ أو ملف kernel_source_url.txt'
        required: false
        default: ''
        type: string
      boot_direct_url:
        description: 'رابط مباشر لـ boot.img - اتركه فارغاً لاستخدام الملف من boot-stock/boot.img أو ملف boot_url.txt'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository (scripts & configs)
        uses: actions/checkout@v4

      # ========== قراءة الرابط الافتراضي لسورس النواة من ملف (إن وجد) ==========
      - name: Read default kernel source URL from file
        id: read_kernel_url
        run: |
          if [ -f "kernel_source_url.txt" ]; then
            DEFAULT_URL=$(cat kernel_source_url.txt | head -1)
            echo "default_url=$DEFAULT_URL" >> $GITHUB_OUTPUT
            echo "Found default kernel source URL in kernel_source_url.txt"
          else
            echo "default_url=" >> $GITHUB_OUTPUT
          fi

      # ========== قراءة الرابط الافتراضي لـ boot.img من ملف (إن وجد) ==========
      - name: Read default boot URL from file
        id: read_boot_url
        run: |
          if [ -f "boot_url.txt" ]; then
            DEFAULT_BOOT_URL=$(cat boot_url.txt | head -1)
            echo "default_boot_url=$DEFAULT_BOOT_URL" >> $GITHUB_OUTPUT
            echo "Found default boot URL in boot_url.txt"
          else
            echo "default_boot_url=" >> $GITHUB_OUTPUT
          fi

      # ========== تحديد رابط السورس الفعلي (المدخل أو الافتراضي) ==========
      - name: Set effective kernel source URL
        id: set_kernel_url
        run: |
          INPUT_URL="${{ github.event.inputs.kernel_source_url }}"
          if [ -n "$INPUT_URL" ]; then
            echo "effective_url=$INPUT_URL" >> $GITHUB_OUTPUT
            echo "Using input kernel URL"
          else
            DEFAULT_URL="${{ steps.read_kernel_url.outputs.default_url }}"
            if [ -n "$DEFAULT_URL" ]; then
              echo "effective_url=$DEFAULT_URL" >> $GITHUB_OUTPUT
              echo "Using default kernel URL from file"
            else
              echo "effective_url=" >> $GITHUB_OUTPUT
            fi
          fi

      # ========== تحديد رابط boot.img الفعلي (المدخل أو الافتراضي) ==========
      - name: Set effective boot URL
        id: set_boot_url
        run: |
          INPUT_BOOT="${{ github.event.inputs.boot_direct_url }}"
          if [ -n "$INPUT_BOOT" ]; then
            echo "effective_boot_url=$INPUT_BOOT" >> $GITHUB_OUTPUT
            echo "Using input boot URL"
          else
            DEFAULT_BOOT="${{ steps.read_boot_url.outputs.default_boot_url }}"
            if [ -n "$DEFAULT_BOOT" ]; then
              echo "effective_boot_url=$DEFAULT_BOOT" >> $GITHUB_OUTPUT
              echo "Using default boot URL from file"
            else
              echo "effective_boot_url=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl device-tree-compiler \
            flex g++-multilib gcc-multilib git gnupg gperf imagemagick libc6-dev-i386 \
            libelf-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc \
            zip zlib1g-dev dwarves pahole libarchive-tools zstd kmod erofs-utils android-sdk-libsparse-utils \
            unzip xz-utils
          mkdir -p $HOME/toolchains

      # ========== 1. الحصول على سورس النواة ==========
      - name: Download Kernel Source from URL
        id: download_source
        if: steps.set_kernel_url.outputs.effective_url != ''
        run: |
          SOURCE_URL="${{ steps.set_kernel_url.outputs.effective_url }}"
          echo "Downloading kernel source from: $SOURCE_URL"
          mkdir -p kernel-source
          if [[ "$SOURCE_URL" == *.git ]]; then
            git clone --depth=1 "$SOURCE_URL" kernel-source
          elif [[ "$SOURCE_URL" == *.tar.gz ]]; then
            wget -O kernel-source.tar.gz "$SOURCE_URL"
            tar -xzf kernel-source.tar.gz -C kernel-source --strip-components=1
          elif [[ "$SOURCE_URL" == *.tar.xz ]]; then
            wget -O kernel-source.tar.xz "$SOURCE_URL"
            tar -xJf kernel-source.tar.xz -C kernel-source --strip-components=1
          else
            wget -O kernel-source.zip "$SOURCE_URL"
            unzip -q kernel-source.zip -d kernel-source
          fi
          echo "KERNEL_SOURCE_DIR=kernel-source" >> $GITHUB_OUTPUT
          ls -la kernel-source/

      - name: Use kernel source from repo folder 'kernel/'
        if: steps.set_kernel_url.outputs.effective_url == ''
        run: |
          if [ -d "kernel" ]; then
            mkdir -p kernel-source
            rsync -av ./kernel/ kernel-source/
            echo "KERNEL_SOURCE_DIR=kernel-source" >> $GITHUB_OUTPUT
            echo "Using kernel source from repo folder 'kernel/'"
          else
            echo "ERROR: No kernel source URL provided and no 'kernel/' folder found."
            exit 1
          fi

      # ========== 2. الحصول على boot.img ==========
      - name: Download boot.img from effective URL
        id: try_url
        if: steps.set_boot_url.outputs.effective_boot_url != ''
        run: |
          mkdir -p kernel-source/stock_boot
          if wget -O kernel-source/stock_boot/boot.img "${{ steps.set_boot_url.outputs.effective_boot_url }}"; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            rm -f kernel-source/stock_boot/boot.img
          fi

      - name: Use boot.img from repository (fallback)
        if: |
          steps.set_boot_url.outputs.effective_boot_url == '' ||
          (steps.set_boot_url.outputs.effective_boot_url != '' && steps.try_url.outputs.success == 'false')
        run: |
          if [ -f "boot-stock/boot.img" ]; then
            mkdir -p kernel-source/stock_boot
            cp boot-stock/boot.img kernel-source/stock_boot/
            echo "Using boot.img from repository (boot-stock/boot.img)"
          else
            echo "No boot.img found. Kernel Image will be built only."
          fi

      # ========== 3. نسخ سكريبت البناء والملفات المساعدة ==========
      - name: Copy build script and patches to kernel source
        run: |
          cp build_a35.sh kernel-source/
          cp custom.config kernel-source/ 2>/dev/null || true
          cp -r patches kernel-source/ 2>/dev/null || true
          chmod +x kernel-source/build_a35.sh

      # ========== 4. بناء النواة ==========
      - name: Build Kernel
        run: |
          cd kernel-source
          ./build_a35.sh

      # ========== 5. رفع المخرجات ==========
      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: kernel-source/build/Image

      - name: Upload Boot Image (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: boot-image
          path: kernel-source/build/boot.img

      - name: Create Odin tar (if boot.img exists)
        if: hashFiles('kernel-source/build/boot.img') != ''
        run: |
          cd kernel-source/build
          tar -cvf Custom-Kernel.tar boot.img
      - name: Upload Odin tar
        if: hashFiles('kernel-source/build/Custom-Kernel.tar') != ''
        uses: actions/upload-artifact@v4
        with:
          name: odin-tar
          path: kernel-source/build/Custom-Kernel.tar
