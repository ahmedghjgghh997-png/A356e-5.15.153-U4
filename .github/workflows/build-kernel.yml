name: Build Kernel with KernelSU-Next + SusFS

on:
  workflow_dispatch:
    inputs:
      kernel_source_url:
        description: 'رابط سورس النواة (ZIP, TAR.GZ, TAR.XZ, .git, Google Drive, transfernow)'
        required: true
      boot_direct_url:
        description: 'رابط boot.img (مباشر أو Google Drive) - اختياري'
        required: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository (for scripts & patches)
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl device-tree-compiler \
            flex g++-multilib gcc-multilib git gnupg gperf imagemagick libc6-dev-i386 \
            libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc \
            zip zlib1g-dev dwarves pahole libarchive-tools zstd kmod erofs-utils \
            unzip xz-utils python3-pip clang-18 lld-18 libyaml-dev cpio tofrodos python3-markdown
          pip install gdown
          npm install -g transfernow-cli   # لدعم transfernow.net

      - name: Download kernel source
        run: |
          URL="${{ github.event.inputs.kernel_source_url }}"
          mkdir -p kernel-source

          # دعم transfernow.net
          if [[ "$URL" == *transfernow.net* ]]; then
            CODE=$(echo "$URL" | grep -oP 'utm_source=\K[^&]+')
            transfernow download "$CODE" -O kernel-source.zip
            unzip -q kernel-source.zip -d kernel-source
          # دعم Google Drive
          elif [[ "$URL" == *drive.google.com* ]]; then
            ID=$(echo "$URL" | grep -oP '(?<=/d/)[a-zA-Z0-9_-]+')
            gdown "https://drive.google.com/uc?id=${ID}" -O kernel.zip
            unzip -q kernel.zip -d kernel-source
          # دعم .git
          elif [[ "$URL" == *.git ]]; then
            git clone --depth=1 "$URL" kernel-source
          # دعم الروابط المباشرة (zip, tar.gz, tar.xz)
          else
            curl -L -o kernel.download "$URL"
            case "$(file -b --mime-type kernel.download)" in
              application/zip) unzip -q kernel.download -d kernel-source ;;
              application/gzip) tar -xzf kernel.download -C kernel-source --strip-components=1 ;;
              application/x-xz) tar -xJf kernel.download -C kernel-source --strip-components=1 ;;
              *) echo "Unsupported format"; exit 1 ;;
            esac
          fi

          # معالجة Kernel.tar.gz (من Samsung)
          if [ -f kernel-source/Kernel.tar.gz ]; then
            cd kernel-source && tar -xvf Kernel.tar.gz && rm Kernel.tar.gz && cd ..
          fi

      - name: Download boot.img (optional)
        if: github.event.inputs.boot_direct_url != ''
        run: |
          BOOT_URL="${{ github.event.inputs.boot_direct_url }}"
          mkdir -p kernel-source/stock_boot
          if [[ "$BOOT_URL" == *drive.google.com* ]]; then
            ID=$(echo "$BOOT_URL" | grep -oP '(?<=/d/)[a-zA-Z0-9_-]+')
            gdown "https://drive.google.com/uc?id=${ID}" -O kernel-source/stock_boot/boot.img
          else
            curl -L -o kernel-source/stock_boot/boot.img "$BOOT_URL"
          fi
          # تحقق من أنه ليس صفحة HTML
          if file kernel-source/stock_boot/boot.img | grep -q "HTML"; then
            echo "ERROR: boot.img link returned HTML page"
            rm kernel-source/stock_boot/boot.img
            exit 1
          fi

      - name: Copy build script and patches
        run: |
          cp build_a35.sh kernel-source/
          [ -f custom.config ] && cp custom.config kernel-source/
          [ -d patches ] && cp -r patches kernel-source/
          chmod +x kernel-source/build_a35.sh

      - name: Build kernel
        run: |
          cd kernel-source
          ./build_a35.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-output
          path: kernel-source/build/
