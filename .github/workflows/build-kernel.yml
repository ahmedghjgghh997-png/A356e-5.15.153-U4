name: Build Kernel with KernelSU-Next + SusFS

on:
  workflow_dispatch:
    inputs:
      kernel_source_url:
        description: 'رابط سورس النواة (ZIP, TAR.GZ, TAR.XZ, .git, أو Google Drive)'
        required: true
      boot_direct_url:
        description: 'رابط boot.img (مباشر أو Google Drive) - اختياري'
        required: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository (for scripts & patches)
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl device-tree-compiler \
            flex g++-multilib gcc-multilib git gnupg gperf imagemagick libc6-dev-i386 \
            libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc \
            zip zlib1g-dev dwarves pahole libarchive-tools zstd kmod erofs-utils \
            unzip xz-utils python3-pip clang-18 lld-18 libyaml-dev cpio tofrodos python3-markdown
          pip install gdown

      - name: Download kernel source
        run: |
          URL="${{ github.event.inputs.kernel_source_url }}"
          mkdir -p kernel-source

          # دالة للتحميل من Google Drive بطريقة قوية
          download_google_drive() {
            local FILE_ID=$1
            local OUTPUT=$2
            echo "Downloading from Google Drive with ID: $FILE_ID"
            # استخدام gdown أولاً
            if gdown --fuzzy "https://drive.google.com/uc?id=${FILE_ID}" -O "$OUTPUT" 2>/dev/null; then
              echo "gdown succeeded"
              return 0
            fi
            # إذا فشل، استخدام curl مع حفظ الكوكيز
            echo "gdown failed, trying curl with cookie..."
            curl -sc /tmp/cookie "https://drive.google.com/uc?export=download&id=${FILE_ID}" > /dev/null
            CODE=$(awk '/download/ {print $NF}' /tmp/cookie)
            curl -Lb /tmp/cookie "https://drive.google.com/uc?export=download&confirm=${CODE}&id=${FILE_ID}" -o "$OUTPUT"
            if [ $? -eq 0 ] && [ -s "$OUTPUT" ]; then
              echo "curl download succeeded"
              return 0
            fi
            return 1
          }

          if [[ "$URL" == *drive.google.com* ]]; then
            # استخراج FILE_ID
            FILE_ID=$(echo "$URL" | grep -oP '(?<=/d/)[a-zA-Z0-9_-]+')
            if [ -z "$FILE_ID" ]; then
              FILE_ID=$(echo "$URL" | grep -oP 'id=[a-zA-Z0-9_-]+' | cut -d= -f2)
            fi
            if [ -z "$FILE_ID" ]; then
              echo "ERROR: Could not extract Google Drive file ID"
              exit 1
            fi
            download_google_drive "$FILE_ID" "kernel.zip"
            if [ $? -ne 0 ]; then
              echo "Failed to download from Google Drive"
              exit 1
            fi
            # التحقق من صحة الملف
            if file kernel.zip | grep -q "Zip archive"; then
              unzip -q kernel.zip -d kernel-source
            else
              echo "Downloaded file is not a valid ZIP archive"
              exit 1
            fi
          elif [[ "$URL" == *.git ]]; then
            git clone --depth=1 "$URL" kernel-source
          else
            curl -L -o kernel.download "$URL"
            case "$(file -b --mime-type kernel.download)" in
              application/zip) unzip -q kernel.download -d kernel-source ;;
              application/gzip) tar -xzf kernel.download -C kernel-source --strip-components=1 ;;
              application/x-xz) tar -xJf kernel.download -C kernel-source --strip-components=1 ;;
              *) echo "Unsupported format"; exit 1 ;;
            esac
          fi

          # معالجة Kernel.tar.gz (من Samsung)
          if [ -f kernel-source/Kernel.tar.gz ]; then
            cd kernel-source && tar -xvf Kernel.tar.gz && rm Kernel.tar.gz && cd ..
          fi

      - name: Download boot.img (optional)
        if: github.event.inputs.boot_direct_url != ''
        run: |
          BOOT_URL="${{ github.event.inputs.boot_direct_url }}"
          mkdir -p kernel-source/stock_boot
          if [[ "$BOOT_URL" == *drive.google.com* ]]; then
            ID=$(echo "$BOOT_URL" | grep -oP '(?<=/d/)[a-zA-Z0-9_-]+')
            if [ -z "$ID" ]; then
              ID=$(echo "$BOOT_URL" | grep -oP 'id=[a-zA-Z0-9_-]+' | cut -d= -f2)
            fi
            # استخدام نفس الدالة القوية للتحميل
            source <(declare -f download_google_drive); download_google_drive "$ID" "kernel-source/stock_boot/boot.img"
          else
            curl -L -o kernel-source/stock_boot/boot.img "$BOOT_URL"
          fi
          # التحقق من أنه ليس صفحة HTML
          if file kernel-source/stock_boot/boot.img | grep -q "HTML"; then
            echo "ERROR: boot.img link returned HTML page"
            rm kernel-source/stock_boot/boot.img
            exit 1
          fi

      - name: Copy build script and patches
        run: |
          cp build_a35.sh kernel-source/
          [ -f custom.config ] && cp custom.config kernel-source/
          [ -d patches ] && cp -r patches kernel-source/
          chmod +x kernel-source/build_a35.sh

      - name: Build kernel
        run: |
          cd kernel-source
          ./build_a35.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-output
          path: kernel-source/build/
