name: Build Kernel with KernelSU for A35

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط السورس (GitHub repo, Google Drive, أو رابط مباشر لملف مضغوط)'
        required: true
      boot_img_url:
        description: 'رابط مباشر لـ boot.img (اتركه فارغاً لاستخدام AnyKernel3)'
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git device-tree-compiler lz4 xz-utils zlib1g-dev openjdk-17-jdk \
            gcc g++ python3 python-is-python3 p7zip-full android-sdk-libsparse-utils erofs-utils \
            build-essential zip curl libc6-dev libncurses-dev bc make cpio kmod openssl \
            libelf-dev libssl-dev zstd rsync wget patch unzip dwarves
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb || true
          pip3 install gdown
          sudo apt install -y pahole || sudo ln -s /usr/bin/pahole /usr/local/bin/pahole

      - name: Get magiskboot
        run: |
          curl -L -o magisk.apk "https://github.com/topjohnwu/Magisk/releases/download/v28.1/Magisk-v28.1.apk"
          unzip -j magisk.apk 'lib/x86_64/libmagiskboot.so' -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          sudo cp magiskboot /usr/local/bin/
          rm -f magisk.apk

      - name: Download kernel source
        run: |
          URL="${{ github.event.inputs.source_url }}"
          if [[ "$URL" == *"drive.google.com"* ]]; then
            FILE_ID=$(echo "$URL" | grep -oP '(?<=id=)[^&]+' || echo "$URL" | grep -oP '(?<=/d/)[^/]+')
            echo "Downloading from Google Drive ID: $FILE_ID"
            gdown --fuzzy "https://drive.google.com/uc?id=$FILE_ID" -O source.file
          else
            wget -O source.file "$URL"
          fi
          
          FILE_TYPE=$(file -b --mime-type source.file)
          echo "File type: $FILE_TYPE"
          mkdir -p kernel_source
          
          case "$FILE_TYPE" in
            application/zip)
              unzip -q source.file -d kernel_source
              ;;
            application/x-tar|application/x-gzip|application/gzip)
              tar -xf source.file -C kernel_source
              ;;
            application/x-xz)
              tar -xJf source.file -C kernel_source
              ;;
            application/x-bzip2)
              tar -xjf source.file -C kernel_source
              ;;
            *)
              if tar -xf source.file -C kernel_source 2>/dev/null; then
                echo "Extracted with tar (fallback)"
              elif unzip -q source.file -d kernel_source 2>/dev/null; then
                echo "Extracted with unzip (fallback)"
              else
                echo "Unknown format, copying raw file"
                cp source.file kernel_source/
              fi
              ;;
          esac
          rm source.file
          
          cd kernel_source
          if [ $(ls -1 | wc -l) -eq 1 ] && [ -d $(ls -1) ]; then
            SUBDIR=$(ls -1)
            mv $SUBDIR/* ./
            rmdir $SUBDIR
          fi
          cd ..
          
          if [ -d "kernel_source/common" ] && [ -f "kernel_source/common/Makefile" ]; then
            echo "KERNEL_ROOT=$(pwd)/kernel_source/common" >> $GITHUB_ENV
          elif [ -d "kernel_source/kernel-5.15" ] && [ -f "kernel_source/kernel-5.15/Makefile" ]; then
            echo "KERNEL_ROOT=$(pwd)/kernel_source/kernel-5.15" >> $GITHUB_ENV
          else
            echo "KERNEL_ROOT=$(pwd)/kernel_source" >> $GITHUB_ENV
          fi

      - name: Patch source code for typedef redefinition
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          if [ -f "security/kzt/kzt_common.h" ]; then
            sed -i 's/typedef unsigned int u32;/\/\/ typedef unsigned int u32; \/\/ disabled/g' security/kzt/kzt_common.h
          fi

      - name: Setup toolchains
        run: |
          mkdir -p $HOME/tc
          cd $HOME/tc
          wget -q https://github.com/ravindu644/Android-Kernel-Tutorials/releases/download/toolchains/clang-r450784e.tar.gz
          mkdir clang && cd clang && tar -xf ../clang-r450784e.tar.gz && cd ..
          wget -q https://github.com/ravindu644/Android-Kernel-Tutorials/releases/download/toolchains/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          mv arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu gcc
          echo "TOOLCHAIN=$HOME/tc" >> $GITHUB_ENV

      - name: Build kernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          export ARCH=arm64
          export PATH=${{ env.TOOLCHAIN }}/clang/bin:${{ env.TOOLCHAIN }}/gcc/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export TARGET_SOC=s5e8835
          export PLATFORM_VERSION=15
          export ANDROID_MAJOR_VERSION=v
          
          # إضافة -fno-stack-protector إلى الدرع الواسع
          export SHIELD_FLAGS="-w -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-incompatible-pointer-types -Wno-pointer-sign -Wno-vla -Wno-int-conversion -Wno-return-type -Wno-implicit-fallthrough -fgnu89-inline -fno-stack-protector"
          export KCFLAGS="$SHIELD_FLAGS"
          export KCPPFLAGS="-Wno-error"

          cat > custom.config << EOF
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          CONFIG_UH_LKMAUTH=n
          CONFIG_UH_LKM_BLOCK=n
          CONFIG_RKP_CFP_JOPP=n
          CONFIG_RKP_CFP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          EOF

          DEFCONFIG=$(ls arch/arm64/configs/*a35*defconfig 2>/dev/null | head -1 | xargs basename)
          [ -z "$DEFCONFIG" ] && DEFCONFIG=$(ls arch/arm64/configs/*_defconfig | head -1 | xargs basename)
          echo "Using defconfig: $DEFCONFIG"
          make $DEFCONFIG
          scripts/kconfig/merge_config.sh .config custom.config
          
          # تعطيل Stack Protector و BTF
          scripts/config --file .config -d CONFIG_STACKPROTECTOR
          scripts/config --file .config -d CONFIG_STACKPROTECTOR_STRONG
          scripts/config --file .config -d CONFIG_STACKPROTECTOR_PER_TASK
          scripts/config --file .config -d CONFIG_DEBUG_INFO_BTF
          scripts/config --file .config -d CONFIG_MODULE_SIG
          scripts/config --file .config -d CONFIG_MODULE_SIG_FORCE
          scripts/config --file .config --set-str CONFIG_LOCALVERSION "-KernelSU"
          
          make -j$(nproc) Image KCFLAGS="$SHIELD_FLAGS" KCPPFLAGS="-Wno-error"
          
          cp arch/arm64/boot/Image $GITHUB_WORKSPACE/Image

      - name: Create boot.img (if boot.img URL provided)
        if: github.event.inputs.boot_img_url != ''
        run: |
          URL="${{ github.event.inputs.boot_img_url }}"
          if [[ "$URL" == *"drive.google.com"* ]]; then
            FILE_ID=$(echo "$URL" | grep -oP '(?<=id=)[^&]+' || echo "$URL" | grep -oP '(?<=/d/)[^/]+')
            gdown --fuzzy "https://drive.google.com/uc?id=$FILE_ID" -O boot.img
          else
            wget -O boot.img "$URL"
          fi
          magiskboot unpack boot.img
          rm -f kernel
          cp $GITHUB_WORKSPACE/Image kernel
          magiskboot repack boot.img
          mv new-boot.img boot-ksu.img
          tar -cf boot-ksu.tar boot-ksu.img
          echo "BOOT_IMG_CREATED=true" >> $GITHUB_ENV

      - name: Create AnyKernel3.zip (if no boot.img URL)
        if: github.event.inputs.boot_img_url == ''
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          cp $GITHUB_WORKSPACE/Image AnyKernel3/
          cd AnyKernel3
          zip -r9 ../AnyKernel3-$(date +%Y%m%d-%H%M%S).zip . -x ".git*" "README.md" "*.zip"
          cd ..
          echo "ANY_KERNEL_ZIP=$(ls AnyKernel3-*.zip)" >> $GITHUB_ENV
          cp *.zip $GITHUB_WORKSPACE/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-output
          path: |
            Image
            boot-ksu.img
            boot-ksu.tar
            *.zip
