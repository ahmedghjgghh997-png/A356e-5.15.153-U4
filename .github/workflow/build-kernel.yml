name: Build Kernel with KernelSU for A35

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط السورس (GitHub repo, Google Drive, أو رابط مباشر لملف مضغوط)'
        required: true
      boot_img_url:
        description: 'رابط مباشر لـ boot.img (اختياري)'
        required: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git device-tree-compiler lz4 xz-utils zlib1g-dev openjdk-17-jdk \
            gcc g++ python3 python-is-python3 p7zip-full android-sdk-libsparse-utils erofs-utils \
            build-essential zip curl libc6-dev libncurses-dev bc make cpio kmod openssl \
            libelf-dev libssl-dev zstd rsync wget patch unzip
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb || true
          pip3 install gdown

      - name: Get magiskboot
        run: |
          curl -L -o magisk.apk https://github.com/topjohnwu/Magisk/releases/latest/download/Magisk.apk
          unzip -j magisk.apk 'lib/x86_64/libmagiskboot.so' -d .
          mv libmagiskboot.so magiskboot
          chmod +x magiskboot
          sudo cp magiskboot /usr/local/bin/
          rm -f magisk.apk

      - name: Download kernel source (smart)
        run: |
          URL="${{ github.event.inputs.source_url }}"
          # تحويل رابط Google Drive
          if [[ "$URL" == *"drive.google.com"* ]]; then
            FILE_ID=$(echo "$URL" | grep -o 'id=[^&]*' | cut -d= -f2)
            [ -z "$FILE_ID" ] && FILE_ID=$(echo "$URL" | grep -o 'file/d/[^/]*' | cut -d/ -f3)
            echo "تحميل من Google Drive ID: $FILE_ID"
            gdown --fuzzy "https://drive.google.com/uc?id=$FILE_ID" -O source.zip
            mkdir -p kernel_source
            unzip -q source.zip -d kernel_source
            rm source.zip
          elif [[ "$URL" =~ \.(zip|tar|tar.gz|tgz|tar.xz|bz2)$ ]]; then
            wget -O source.archive "$URL"
            mkdir -p kernel_source
            if [[ "$URL" == *.zip ]]; then
              unzip -q source.archive -d kernel_source
            elif [[ "$URL" == *.tar.gz ]] || [[ "$URL" == *.tgz ]]; then
              tar -xzf source.archive -C kernel_source
            elif [[ "$URL" == *.tar.xz ]]; then
              tar -xf source.archive -C kernel_source
            else
              tar -xf source.archive -C kernel_source
            fi
            rm source.archive
          else
            git clone --depth=1 "$URL" kernel_source
          fi
          # رفع المجلدات الفرعية إذا وجدت
          cd kernel_source
          if [ $(ls -1 | wc -l) -eq 1 ] && [ -d $(ls -1) ]; then
            SUBDIR=$(ls -1)
            mv $SUBDIR/* ./
            rmdir $SUBDIR
          fi
          cd ..
          # البحث عن kernel root
          if [ -d "kernel_source/common" ] && [ -f "kernel_source/common/Makefile" ]; then
            echo "KERNEL_ROOT=$(pwd)/kernel_source/common" >> $GITHUB_ENV
          elif [ -d "kernel_source/kernel-5.15" ] && [ -f "kernel_source/kernel-5.15/Makefile" ]; then
            echo "KERNEL_ROOT=$(pwd)/kernel_source/kernel-5.15" >> $GITHUB_ENV
          else
            echo "KERNEL_ROOT=$(pwd)/kernel_source" >> $GITHUB_ENV
          fi

      - name: Setup toolchains
        run: |
          mkdir -p $HOME/tc
          cd $HOME/tc
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r450784d.tar.gz
          mkdir clang && cd clang && tar -xf ../clang-r450784d.tar.gz && cd ..
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          mv arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu gcc
          echo "TOOLCHAIN=$HOME/tc" >> $GITHUB_ENV

      - name: Build kernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          export ARCH=arm64
          export PATH=${{ env.TOOLCHAIN }}/clang/bin:${{ env.TOOLCHAIN }}/gcc/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export TARGET_SOC=s5e8835
          export PLATFORM_VERSION=15
          export ANDROID_MAJOR_VERSION=v

          cat > custom.config << EOF
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          CONFIG_UH_LKMAUTH=n
          CONFIG_UH_LKM_BLOCK=n
          CONFIG_RKP_CFP_JOPP=n
          CONFIG_RKP_CFP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          EOF

          DEFCONFIG=$(ls arch/arm64/configs/*a35*defconfig 2>/dev/null | head -1 | xargs basename)
          if [ -z "$DEFCONFIG" ]; then
            DEFCONFIG=$(ls arch/arm64/configs/*_defconfig | head -1 | xargs basename)
          fi
          echo "Using defconfig: $DEFCONFIG"
          make $DEFCONFIG
          scripts/kconfig/merge_config.sh .config custom.config
          scripts/config --file .config -d CONFIG_MODULE_SIG
          scripts/config --file .config -d CONFIG_MODULE_SIG_FORCE
          scripts/config --file .config --set-str CONFIG_LOCALVERSION "-KernelSU"
          make -j$(nproc) Image
          cp arch/arm64/boot/Image $GITHUB_WORKSPACE/

      - name: Download and repack boot.img (optional)
        if: github.event.inputs.boot_img_url != ''
        run: |
          URL="${{ github.event.inputs.boot_img_url }}"
          if [[ "$URL" == *"drive.google.com"* ]]; then
            FILE_ID=$(echo "$URL" | grep -o 'id=[^&]*' | cut -d= -f2)
            [ -z "$FILE_ID" ] && FILE_ID=$(echo "$URL" | grep -o 'file/d/[^/]*' | cut -d/ -f3)
            gdown --fuzzy "https://drive.google.com/uc?id=$FILE_ID" -O boot.img
          else
            wget -O boot.img "$URL"
          fi
          magiskboot unpack boot.img
          rm -f kernel
          cp $GITHUB_WORKSPACE/Image kernel
          magiskboot repack boot.img
          mv new-boot.img boot-ksu.img
          tar -cf boot-ksu.tar boot-ksu.img

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-output
          path: |
            Image
            boot-ksu.img
            boot-ksu.tar
